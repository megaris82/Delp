<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delp</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">
      <div class="name">Delp - The Help Desk WebApp</div>
    </div>
    <div class="nav-actions">
      <button id="openLogin" class="btn btn-solid">Σύνδεση</button>
      <button id="openRegister" class="btn btn-solid">Εγγραφή</button>
    </div>
  </nav>

  <main class="hero">
    <h1>Καλώς ήρθατε στο Delp</h1>
    <p>Το σύστημα Help Desk για την υποστήριξη του οργανισμού σας.</p>
  </main>

  <div id="overlay" class="overlay">
    <div class="modal">
      <button id="closeModal" class="modal-close" aria-label="Κλείσιμο">&times;</button>
      <h2 id="modalTitle">Σύνδεση</h2>

      <div class="tabs">
        <button id="tabLogin" class="tab active">Σύνδεση</button>
        <button id="tabRegister" class="tab">Εγγραφή</button>
      </div>

      <form id="authForm" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" />
        </div>

        <div class="field register-only">
          <label for="firstName">Όνομα</label>
          <input type="text" id="firstName" name="firstName" autocomplete="given-name" />
        </div>
        <div class="field register-only">
          <label for="lastName">Επώνυμο</label>
          <input type="text" id="lastName" name="lastName" autocomplete="family-name" />
        </div>
        <div class="field register-only">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" autocomplete="email" />
        </div>
        <div class="field register-only">
          <label for="country">Χώρα</label>
          <select id="country" name="country">
            <option value="">Επιλέξτε χώρα…</option>
          </select>
        </div>
        <div class="field register-only">
          <label for="city">Πόλη</label>
          <select id="city" name="city" disabled>
            <option value="">Επιλέξτε πρώτα χώρα…</option>
          </select>
        </div>
        <div class="field register-only">
          <label for="address">Διεύθυνση</label>
          <input type="text" id="address" name="address" autocomplete="street-address" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" />
        </div>

        <div class="field register-only">
          <label for="confirm">Επιβεβαίωση Password</label>
          <input type="password" id="confirm" name="confirm" autocomplete="new-password" />
        </div>

        <button type="submit" id="submitBtn" class="btn btn-solid btn-block">Σύνδεση</button>
      </form>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
